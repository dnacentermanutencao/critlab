<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CritLab — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --red:#f85149;--red-bg:rgba(248,81,73,.12);--red-border:rgba(248,81,73,.3);--blue:#58a6ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-transform:uppercase;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:40px 36px;width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:60px;height:60px;background:var(--red-bg);border:2px solid var(--red-border);
  border-radius:16px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:14px;}
.logo-name{font-size:24px;font-weight:700;letter-spacing:-.5px;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:1px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);
  letter-spacing:.7px;margin-bottom:6px;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:6px;padding:11px 14px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;outline:none;transition:border-color .15s;text-transform:uppercase;}
.field input:focus{border-color:var(--blue);}
.btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:6px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;transition:background .15s;margin-top:6px;}
.btn:hover{background:#e03c34;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:var(--red-bg);border:1px solid var(--red-border);border-radius:6px;
  padding:10px 14px;font-size:12px;color:var(--red);margin-top:14px;display:none;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--text3);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚕</div>
    <div class="logo-name">CritLab</div>
    <div class="logo-sub">Resultados Críticos Hospitalares</div>
  </div>
  <div class="field">
    <label>Usuário</label>
    <input id="u" type="text" placeholder="Seu usuário" autocomplete="username">
  </div>
  <div class="field">
    <label>Senha</label>
    <input id="p" type="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="btn" onclick="login()">Entrar</button>
  <div class="err" id="err"></div>
  <div class="footer">Acesso restrito — somente usuários autorizados</div>
</div>
<script>
async function login(){
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  const u=document.getElementById('u').value.trim(), p=document.getElementById('p').value;
  if(!u||!p){err.textContent='Preencha usuário e senha.';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Aguarde...'; err.style.display='none';
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,password:p})});
  const data=await res.json();
  if(res.ok){window.location.href=data.role==='admin'?'/admin':'/app';}
  else{err.textContent=data.error||'Erro ao autenticar.';err.style.display='block';
    btn.disabled=false;btn.textContent='Entrar';}
}
</script>
</body>
</html>
